version: "3.8"
services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: emmy_root_pass
      MYSQL_DATABASE: emmy
      MYSQL_USER: emmy
      MYSQL_PASSWORD: emmy_pass
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8088:8088"
    environment:
      - DATABASE_URL=mysql://emmy:emmy_pass@db:3306/emmy
      - APP_SECRET=change_this_secret
    env_file:
      - .env

volumes:
  db-data:
    driver: local

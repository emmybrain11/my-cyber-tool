name: Build and Package Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Install npm dependencies and build package
        run: |
          cd app
          npm ci --omit=optional
          npm run build:package

      - name: Upload release ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-release
          path: app/release.zip

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-${{ github.run_number }}
          release_name: sentinel-release-${{ github.run_number }}
          body: "Automated package release: build ${{ github.run_number }}"
          draft: false
          prerelease: false

      - name: Upload release ZIP to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/release.zip
          asset_name: release.zip
          asset_content_type: application/zip
